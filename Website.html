<style>
  :root {
    --navy: #0B2545;
    --federal: #1A5BC6;
    --sky: #5DB2E8;
    --bone: #F5F0E6;
    --paper: #FBF8F2;
    --ink: #0A1628;
    --ink-2: #2A3B52;
    --ink-3: #6A7588;

    --sans: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); font-family: var(--sans); -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }

  .label-mono { font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-3); }
  .placeholder {
    background:
      repeating-linear-gradient(135deg, rgba(11,37,69,0.06) 0 8px, transparent 8px 16px),
      var(--bone);
    border: 1px dashed var(--ink-3);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3);
    text-align: center; padding: 12px;
  }
  /* simple link reset for nav anchors */
  a.nav-link { text-decoration: none; }
  a.btn-reset { text-decoration: none; display: inline-flex; }
  #root:empty::before { content: ""; display: block; min-height: 100vh; }
